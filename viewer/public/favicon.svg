  <rect x="0"  y="8"  width="8" height="8" fill="#3d3520"/>
  <rect x="8"  y="8"  width="8" height="8" fill="#2d5a1e"/>
  <rect x="16" y="8"  width="8" height="8" fill="#2d5a1e"/>
